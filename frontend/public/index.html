<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="AI Powered Job Tracker - Find your perfect job with AI matching" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />

    <!-- PDF.js for resume reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <title>AI Job Tracker</title>

    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #f7f6f2;
        color: #0a0a0f;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Smooth scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #eeeade; border-radius: 2px; }
      /* Loading screen */
      #initial-loader {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loader-logo {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: 28px;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 24px;
      }
      .loader-dot {
        width: 10px;
        height: 10px;
        background: #e85d26;
        border-radius: 50%;
        animation: pulse 1s infinite;
      }
      .loader-bar {
        width: 200px;
        height: 3px;
        background: rgba(255,255,255,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-fill {
        height: 100%;
        background: #e85d26;
        border-radius: 2px;
        animation: load 1.5s ease forwards;
      }
      .loader-text {
        margin-top: 14px;
        font-size: 12px;
        color: rgba(255,255,255,0.4);
        font-family: 'DM Sans', sans-serif;
        letter-spacing: 1px;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.7; }
      }
      @keyframes load {
        0% { width: 0%; }
        60% { width: 75%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Loading screen shown before React loads -->
    <div id="initial-loader">
      <div class="loader-logo">
        <span class="loader-dot"></span>
        AI Job Tracker
      </div>
      <div class="loader-bar">
        <div class="loader-fill"></div>
      </div>
      <div class="loader-text">Loading your job feed...</div>
    </div>

    <div id="root"></div>

    <!-- Hide loader once React has loaded -->
    <script>
      window.addEventListener('load', function () {
        setTimeout(function () {
          var loader = document.getElementById('initial-loader')
          if (loader) {
            loader.classList.add('hidden')
            setTimeout(function () {
              loader.style.display = 'none'
            }, 400)
          }
        }, 1200)
      })
    </script>
  </body>
</html>
